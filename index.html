<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, inital-scale=1.0" />
        <title>Prism & Pigment</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="stylesheet" href="css/print.css" media="print" />
    </head>

    <body>
        <header>
            <h1>Prism & Pigment</h1>
            <p>Vivid Color Formulation Tool</p>
        </header>

        <main class="container">
            <section class="controls">
                <h2>Virtual Mixing Palette</h2>
                <div id="pigment-sliders"></div>

                <h3>Starting Canvas</h3>
                <div class="canvas-toggle">
                    <button data-level="10">Level 10 Platinum</button>
                    <button data-level="8">Level 8 Blonde</button>
                    <button data-level="6">Level 6 Light Brown</button>
                </div>

            </section>

            <section class="visualization">
                <svg id="hair-svg" viewBox="0 0 200 400">
                    <path id="hair-fill" d="M100,10 C20,80 20,300 100,390 C180,300 180,80 100,10 Z" fill="#ffffff" />
                </svg>

            </section>

            <section class="formulation">
                <h2>Formulation Card</h2>
                <div id="formulation-summary"></div>
                <textarea id="stylist-notes" placeholder="Stylist Notes..."></textarea>
                <button id="print-btn">Print Formulation</button>

            </section>

        </main>

    <!-- Scripts -->
    <script src="js/pigments.js"></script>
    <script src="js/colorMixer.js"></script>
    <script src="js/canvasSimulation.js"></script>
    <script src="js/formulation.js"></script>
    <script src="js/app.js"></script>

    </body>

</html>
